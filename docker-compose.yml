services:
  db:
    image: postgres:alpine
    container_name: filmes
    ports:
      - "5433:5432"
    environment:
          POSTGRES_USERNAME: ${DATABASE_USERNAME}
          POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
          POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
volumes:
  postgres-data:
<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<div th:fragment="header-admin(count, username, isAuthenticated)" class="header w-100 p-3">
    <div class="d-flex align-items-center justify-content-end gap-3 text-white">

        <div th:replace="fragments :: cart(${count})"></div>

        <div class="d-flex align-items-center">
            <span th:text="${username}" class="fw-bold"></span>
        </div>

        <div th:if="${isAuthenticated}">
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>

        <div class="btn-group" th:unless="${isAuthenticated}">
            <a th:href="@{/login}" class="btn btn-outline-light btn-sm">Login</a>
            <a th:href="@{/cadUsuario}" class="btn btn-light btn-sm">Cadastre-se</a>
        </div>

    </div>
</div>

<a th:href="@{'/verCarrinho'}" th:fragment="cart(count)" class="position-relative text-decoration-none cart">
    <div>
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-cart cart-icon" viewBox="0 0 16 16">
            <path d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 13 12H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5M3.102 4l1.313 7h8.17l1.313-7zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4m7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2m7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/>
        </svg>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                <span th:text="${count}"></span>
                <span class="visually-hidden">unread messages</span>
            </span>
    </div>
    <span>
            Carrinho
        </span>
</a>


<article th:fragment="card(filme)" class="card-filme">

    <div class="card-img-container">
        <img th:src="${filme.imageUrl}" alt="Poster" class="img-fluid rounded-top" />
    </div>

    <div class="card-body p-3 flex-grow-1 d-flex flex-column justify-content-between">
        <div class="text-center mb-3">
            <h5 class="text-white fw-bold fs-6 mb-1" th:text="${filme.title}">Título</h5>
            <p class="text-clean" th:text="${filme.genre}">Gênero</p>
        </div>
        <div>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="text-clean">Preço</span>
                <span class="text-purple fw-bold" th:text="'R$ ' + ${filme.price}">R$ 0.00</span>
            </div>

                <a th:href="@{'/adicionarCarrinho/' + ${filme.id}}" class="btn btn-gradient btn-sm w-100">Adicionar</a>
            </div>
        </div>
</article>

<footer th:fragment="footer" class="footer mt-auto py-4">
    <div class="container text-center">
        <p class="text-secondary">
            &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> Filmes.com. Todos os direitos reservados.
        </p>
        <nav class="footer-links">
            <a href="#" class="text-secondary text-decoration-none mx-2">Política de Privacidade</a> |
            <a href="#" class="text-secondary text-decoration-none mx-2">Termos de Uso</a>
        </nav>
    </div>
</footer>


</body>
</html>

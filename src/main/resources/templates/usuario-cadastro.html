<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Filmes.Com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<div class="d-flex flex-column vh-100 p-0">

    <main class="container py-5">
        <section class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <header class="mb-5">
                    <h2 class="text-white fw-bold display-5">Cadastro de Usuário</h2>
                    <p class="text-muted">Preencha as informações para criar um novo perfil no sistema.</p>
                    <hr class="border-secondary opacity-25">
                </header>

                <form method="post" th:action="@{/salvarUsuario}" th:object="${usuario}" class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">NOME DE USUÁRIO</label>
                        <input type="text" th:field="*{username}" class="form-control input-dark" placeholder="Digite o nome de usuário">
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-muted small fw-bold">SENHA</label>
                        <input type="password" th:field="*{password}" class="form-control input-dark" placeholder="Crie uma senha forte">
                        <p class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="col-12">
                        <div class="form-check d-flex align-items-center gap-2 py-2">
                            <input type="checkbox" th:field="*{isAdmin}" id="isAdmin" class="form-check-input">
                            <label for="isAdmin" class="form-check-label text-muted small fw-bold m-0">DEFINIR COMO ADMINISTRADOR DO SISTEMA</label>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-start gap-3 mt-5">
                        <button class="btn btn-gradient px-5" type="submit" style="width: auto;">Finalizar Cadastro</button>
                        <a th:href="@{/login}" class="btn btn-outline-secondary px-4 d-flex align-items-center" style="border-radius: 6px;">Cancelar</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

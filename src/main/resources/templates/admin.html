<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/styles.css}" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Painel Admin - Filmes.Com</title>
</head>
<body>
<div th:replace="fragments :: header-admin(null, ${username}, ${isAuthenticated})"></div>
<main class="container admin-page">
    <div class="row mb-4">
        <div class="col-12">
            <div th:if="${mensagemSucesso}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success text-center" role="alert">
                <span th:text="${mensagemSucesso}"></span>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12">
            <div class="cadastro-container shadow-lg rounded-4 overflow-hidden border border-secondary border-opacity-10">
                <div class="cadastro-container-header bg-dark text-white p-3 fw-bold border-bottom border-secondary border-opacity-25">
                    Gerenciamento de Catálogo
                </div>

                <div class="table-responsive bg-dark bg-opacity-50">
                    <table class="table table-dark table-hover m-0 align-middle w-100">
                        <thead>
                        <tr>
                            <th class="ps-4">Título</th>
                            <th>Gênero</th>
                            <th>Preço</th>
                            <th>Descrição</th>
                            <th>Status</th>
                            <th class="text-center pe-4">Ações</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="filme : ${filmes}">
                            <td class="ps-4" th:text="${filme.title}"></td>
                            <td th:text="${filme.genre}"></td>
                            <td th:text="'R$ ' + ${filme.price}"></td>
                            <td th:text="${filme.description}"></td>
                            <td th:text="${filme.isDeleted == null ? 'Ativo' : 'Deletado em ' + #temporals.format(filme.isDeleted, 'dd/MM/yyyy')}"></td>

                            <td class="text-center pe-4">
                                <div class="d-flex justify-content-center gap-2">
                                    <a th:href="@{'/editar/' + ${filme.id}}" class="btn btn-sm btn-outline-info">Editar</a>
                                    <a th:if="${filme.isDeleted == null}" th:href="@{'/deletar/' + ${filme.id}}" class="btn btn-sm btn-outline-danger">Excluir</a>
                                    <a th:if="${filme.isDeleted != null}" th:href="@{'/restaurar/' + ${filme.id}}" class="btn btn-sm btn-outline-warning">Restaurar</a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 d-flex justify-content-center">
            <a th:href="@{/cadastro}" class="btn btn-gradient px-5 py-2 fw-bold shadow">
                + Novo Filme
            </a>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

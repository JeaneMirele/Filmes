<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Filmes.Com</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>

<body>
<div class="d-flex flex-column vh-100 p-0">

    <main class="container flex-grow-1 d-flex align-items-center">
        <div class="row w-100 justify-content-between align-items-center">

            <section class="col-lg-6">
                <h1 class="brand-title">Filmes<span style="color: #9b51e0;">.Com</span></h1>
                <p class="text-muted mt-3 fs-5 fw-light">Filmes para toda a família</p>
            </section>

            <section class="col-lg-5 d-flex justify-content-center justify-content-lg-end">
                <article class="login-card">
                    <header>
                        <h2 class="text-white fw-bold h4 mb-1">Entrar no Sistema</h2>
                        <p class="text-muted small mb-5">Acesse sua conta para continuar</p>
                    </header>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">USUÁRIO</label>
                            <input type="text" name="username" class="form-control input-dark" placeholder="Usuário" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">SENHA</label>
                            <input type="password" name="password" class="form-control input-dark" placeholder="Senha" required>
                        </div>

                        <button type="submit" class="btn btn-gradient mb-3">Entrar</button>

                        <div th:if="${param.error}" class="alert alert-danger py-2 mt-2 border-0 bg-danger bg-opacity-10 text-danger small text-center">
                            Credenciais inválidas. Verifique usuário e senha.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-info py-2 mt-2 border-0 bg-info bg-opacity-10 text-info small text-center">
                            Você saiu com sucesso.
                        </div>
                    </form>

                    <nav class="text-center mt-4">
                        <p class="text-muted small">Não tem conta? <a th:href="@{/cadUsuario}" style="color: #c084fc; text-decoration: none;">Criar conta</a></p>
                    </nav>
                </article>
            </section>

        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

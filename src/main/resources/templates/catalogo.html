<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/styles.css}" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Catálogo - Filmes.Com</title>
</head>
<body>
<div th:replace="fragments :: header-admin(${carrinhoQtd}, ${username}, ${isAuthenticated})"></div>
<main class="container py-4">
    <div th:if="${mensagemError}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger text-center mb-4" role="alert">
        <span th:text="${mensagemError}"></span>
    </div>
    <div th:if="${mensagemSucesso}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success text-center mb-4" role="alert">
        <span th:text="${mensagemSucesso}"></span>
    </div>

    <div class="catalogo-grid">
        <div th:each="filme : ${filmes}">
            <div th:replace="~{fragments :: card(${filme})}"></div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

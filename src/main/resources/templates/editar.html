<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Editar Filme - Filmes.Com</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">


<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="cadastro-card mx-auto p-4 shadow-lg rounded-4"
             style="max-width: 750px; background-color: rgba(21, 22, 29, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(155, 81, 224, 0.2);">

            <div class="mb-4 text-center">
                <h2 class="text-white fw-bold">Editar Filme</h2>
                <p class="text-muted small">Atualize as informações do catálogo</p>
            </div>

            <form th:action="@{/salvar}" th:object="${filme}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-12">
                    <label class="form-label text-light small fw-bold">Título</label>
                    <input type="text" th:field="*{title}" class="form-control input-dark" placeholder="Título do filme">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label text-light small fw-bold">Descrição</label>
                    <textarea th:field="*{description}" class="form-control input-dark" rows="3"></textarea>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label text-light small fw-bold">Gênero</label>
                    <input type="text" th:field="*{genre}" class="form-control input-dark">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label text-light small fw-bold">Diretor</label>
                    <input type="text" th:field="*{director}" class="form-control input-dark">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label text-light small fw-bold">Preço</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control input-dark">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="col-12 mt-4 text-center">
                    <button type="submit" class="btn btn-gradient w-100 py-2 fw-bold">Salvar Alterações</button>
                    <a th:href="@{/admin}" class="text-clean">Cancelar e Voltar</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
